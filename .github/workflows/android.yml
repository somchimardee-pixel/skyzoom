name: Build SkyZoom APK

on:
  push:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install Gradle
      run: |
        sudo apt update
        sudo apt install gradle -y

    - name: Build
      run: |
        gradle assembleDebug

    - name: Find APK
      run: |
        find . -name "*.apk"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: skyzoom-apk
        path: "**/*.apk"
