name: SkyZoom APK Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          echo "Building SkyZoom"
          mkdir output
          echo test > output/app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: skyzoom-apk
          path: output/app.apk
